name: sereports
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+8

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_bloc: ^9.1.0
  http: ^1.3.0
  flutter_launcher_icons: ^0.14.3
  shimmer: ^3.0.0
  http_interceptor: ^2.0.0
  shared_preferences: ^2.5.2
  equatable: ^2.0.7
  provider: ^6.1.2
  connectivity_plus: ^6.1.0
  sqflite: ^2.4.2
  path: ^1.9.0
  decimal: ^2.3.3
  big_decimal: ^0.5.0
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Assets section – note the indentation (2 spaces)
  assets:
    - assets/
    - assets/icons/
    - assets/icon/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/logo.png"