spring.application.name=sereport-api

# ---------- Server Port ----------
server.port=${PORT:8081}

# ---------- Database (MSSQL) – Railway version active ----------
spring.datasource.maindb.jdbcUrl=${SPRING_DATASOURCE_MAINDB_JDBCURL}
spring.datasource.maindb.username=${SPRING_DATASOURCE_MAINDB_USERNAME}
spring.datasource.maindb.password=${SPRING_DATASOURCE_MAINDB_PASSWORD}
spring.datasource.maindb.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ---------- Original live server (commented out) ----------
#spring.datasource.maindb.jdbcUrl=jdbc:sqlserver://69.62.83.161:1433;databaseName=Semicolans_SeReports;encrypt=true;trustServerCertificate=true;loginTimeout=30;connectRetryCount=3;connectRetryInterval=10
#spring.datasource.maindb.username=SA
#spring.datasource.maindb.password=@SePOSDevOp12345
#spring.datasource.maindb.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ---------- JPA / Hibernate ----------
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=none
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=none

# ---------- Connection Pool ----------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=60000

# ---------- Cache ----------
spring.cache.type=simple

# Redis (commented out)
#spring.data.redis.host=localhost
#spring.data.redis.port=6379
#spring.data.redis.password=
#spring.data.redis.timeout=2000ms
#spring.data.redis.lettuce.pool.max-active=8
#spring.data.redis.lettuce.pool.max-idle=8
#spring.data.redis.lettuce.pool.min-idle=0
#spring.cache.type=redis
#spring.cache.redis.time-to-live=3600000
#spring.cache.cache-names=products,productCount

# ---------- JWT ----------
application.jwt.secretKey=${APPLICATION_JWT_SECRETKEY}
application.jwt.tokenPrefix=Bearer 
application.jwt.tokenExpirationAfterDays=1

# ---------- Logging ----------
logging.level.com.ms.semicolans.sereportapi.sereportapi=DEBUG
logging.level.com.ms.semicolans.sereportapi.sereportapi.jwt=DEBUG
logging.level.com.ms.semicolans.sereportapi.sereportapi.exception=DEBUG
logging.level.com.ms.semicolans.sereportapi.sereportapi.service.impl=DEBUG